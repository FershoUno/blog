name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'assets/**'
      - 'scripts/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  SITE_NAME: Fersho Uno - Blog
  SITE_DESC: Blog personal de Fernando

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Validar frontmatter y assets
        run: |
          for file in content/posts/*.md; do
            [ -f "$file" ] || continue
            node -e "
              const fs = require('fs'), yaml = require('js-yaml');
              const raw = fs.readFileSync('$file', 'utf-8');
              const m = raw.match(/^---\n([\s\S]*?)\n---/);
              if (!m) { console.log('❌ $file: sin frontmatter'); process.exit(1); }
              const fm = yaml.load(m[1]);
              ['title','date','category'].forEach(f => {
                if (!fm[f]) { console.log('❌ $file: falta ' + f); process.exit(1); }
              });
              if (fm.cover) {
                const imgPath = fm.cover.startsWith('/') ? '.' + fm.cover : 'assets/' + fm.cover.replace(/^assets\//, '');
                if (!fs.existsSync(imgPath)) {
                  console.log('❌ $file: imagen faltante ' + fm.cover);
                  process.exit(1);
                }
              }
              console.log('✅ $file');
            "
          done

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Construir SITE_URL
        id: site
        run: |
          if [ -n "${{ vars.SITE_URL }}" ]; then
            echo "url=${{ vars.SITE_URL }}" >> $GITHUB_OUTPUT
          fi
          if [ -n "${{ vars.CNAME }}" ]; then
            echo "cname=${{ vars.CNAME }}" >> $GITHUB_OUTPUT
          fi

      - run: npm run build
        env:
          SITE_URL: ${{ steps.site.outputs.url }}
          SITE_NAME: ${{ env.SITE_NAME }}
          SITE_DESC: ${{ env.SITE_DESC }}
          CNAME: ${{ steps.site.outputs.cname }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'assets/**'
      - 'scripts/**'
      - 'templates/**'
      - 'package.json'
      - 'manifest.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Validar frontmatter de posts
        run: |
          for file in content/posts/*.md; do
            [ -f "$file" ] || continue
            echo "Validando $file..."
            yq_output=$(node -e "
              const fs = require('fs');
              const yaml = require('js-yaml');
              const raw = fs.readFileSync('$file', 'utf-8');
              const match = raw.match(/^---\n([\s\S]*?)\n---/);
              if (!match) { console.log('❌ $file: Sin frontmatter'); process.exit(1); }
              const fm = yaml.load(match[1]);
              const required = ['title','date','category'];
              required.forEach(f => {
                if (!fm[f]) { console.log('❌ $file: Falta ' + f); process.exit(1); }
              });
              if (fm.published === false) { console.log('⚠️ $file: No publicado, omitido'); }
              console.log('✅ $file OK');
            ") || exit 1
          done

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Build completo
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  generate-icons:
    needs: build
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Generar PNG icons desde SVG
        run: |
          echo "Instalar librerías para convertir SVG a PNG..."
          echo "sudo apt install -y librsvg2-bin"
          echo "rsvg-convert -w 192 -h 192 assets/icons/icon-192.svg > public/assets/icons/icon-192.png"
          echo "rsvg-convert -w 512 -h 512 assets/icons/icon-512.svg > public/assets/icons/icon-512.png"

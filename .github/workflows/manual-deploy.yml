name: Deploy Manual

on:
  workflow_dispatch:
    inputs:
      BASE_URL:
        description: 'Base URL path'
        required: false
        default: '/blog'
      SITE_URL:
        description: 'Site URL'
        required: false
        default: 'https://fershouno.github.io/blog'
      CNAME:
        description: 'Custom domain (opcional)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_URL: ${{ github.event.inputs.BASE_URL }}
          SITE_URL: ${{ github.event.inputs.SITE_URL }}
          CNAME: ${{ github.event.inputs.CNAME }}
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
